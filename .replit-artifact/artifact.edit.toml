kind = "mobile"
previewPath = "/"
title = "PRFMR Mobile"
version = "1.0.0"
id = "artifacts/prfmr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25455

[services.development]
run = "EXPO_PACKAGER_PROXY_URL=https://$REPLIT_EXPO_DEV_DOMAIN EXPO_PUBLIC_DOMAIN=$REPLIT_DEV_DOMAIN EXPO_PUBLIC_REPL_ID=$REPL_ID REACT_NATIVE_PACKAGER_HOSTNAME=$REPLIT_DEV_DOMAIN pnpm exec expo start --localhost --port $PORT --clear"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prfmr-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/prfmr-mobile", "run", "serve" ]

[services.env]
PORT = "25455"
BASE_PATH = "/"
