kind = "mobile"
previewPath = "/"
title = "PRFMR Mobile"
version = "1.0.0"
id = "artifacts/prfmr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25455

[services.development]
run = "pnpm --filter @workspace/prfmr-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prfmr-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/prfmr-mobile", "run", "serve" ]

[services.env]
PORT = "25455"
BASE_PATH = "/"
